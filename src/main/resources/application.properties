# ============================================================
#  CampusConnect Market — Application Properties
#  Update DB credentials before running
# ============================================================

spring.application.name=campusconnect-market
server.port=8080

# ── Database ─────────────────────────────────────────────────
# These variables will automatically be picked up by Railway/Render
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/campusconnect_market?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:sohitha@2424}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 Fallback (Commented out)
# spring.datasource.url=jdbc:h2:mem:campusconnect_db;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_UPPER=FALSE
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────────────────────────
# Secret key must be at least 512 bits (64 chars) for HS512
app.jwt.secret=CampusConnectMarketVerySecretKeyForJWTTokenGenerationAndValidation2024XYZ
app.jwt.expiration=86400000

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# ── Logging ──────────────────────────────────────────────────
logging.level.com.campusconnect=DEBUG
logging.level.org.springframework.security=DEBUG
