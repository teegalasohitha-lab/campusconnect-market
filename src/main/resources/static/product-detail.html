<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details — CampusConnect Market</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

    <nav class="navbar-ccm">
        <div class="container">
            <div class="d-flex align-items-center justify-content-between gap-3">
                <a href="/index.html" class="navbar-brand-ccm">Campus<span>Connect</span></a>
                <div id="navUserArea" class="d-flex align-items-center gap-2"></div>
            </div>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/index.html">Home</a></li>
                    <li class="breadcrumb-item"><a href="/products.html">Products</a></li>
                    <li class="breadcrumb-item active" id="breadcrumbTitle">Details</li>
                </ol>
            </nav>

            <div class="row g-5">
                <!-- Product Image -->
                <div class="col-lg-6">
                    <div class="card-ccm p-2 text-center overflow-hidden">
                        <img id="pImg" src="/images/placeholder.jpg" class="img-fluid rounded"
                            style="max-height: 500px; width: auto" alt="Product">
                    </div>
                </div>

                <!-- Product Info -->
                <div class="col-lg-6">
                    <div id="pBadges" class="mb-2"></div>
                    <h1 id="pTitle" class="fw-bold mb-2">Loading...</h1>
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div id="pPrice" class="h3 fw-bold text-primary m-0">₹0.00</div>
                        <span id="pCondition" class="badge-ccm condition-new">NEW</span>
                    </div>

                    <p id="pDesc" class="text-muted mb-4" style="font-size: 1.1rem; line-height: 1.6"></p>

                    <div class="card-ccm p-4 mb-4">
                        <div class="row text-center border-bottom pb-3 mb-3">
                            <div class="col-4 border-end">
                                <div class="small text-muted mb-1">Availability</div>
                                <div id="pStock" class="fw-bold">In Stock</div>
                            </div>
                            <div class="col-4 border-end">
                                <div class="small text-muted mb-1">Location</div>
                                <div id="pLoc" class="fw-bold">—</div>
                            </div>
                            <div class="col-4">
                                <div class="small text-muted mb-1">Seller</div>
                                <div id="pSeller" class="fw-bold">—</div>
                            </div>
                        </div>

                        <div class="d-flex gap-3 mt-4">
                            <div class="flex-grow-1">
                                <button class="btn-primary-ccm w-100 justify-content-center py-3 px-4"
                                    style="font-size: 1.1rem" onclick="handleAddToCart()">
                                    <i class="fas fa-cart-plus me-2"></i> Add to Cart
                                </button>
                            </div>
                            <button class="btn-outline-ccm py-3 px-4" onclick="handleToggleWishlist()">
                                <i class="far fa-heart" id="wishIcon" style="color: #EF4444; font-size: 1.3rem"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mt-4">
                        <h5 class="fw-bold mb-3">Key Details</h5>
                        <ul class="list-unstyled d-grid gap-2">
                            <li class="d-flex align-items-center gap-2"><i class="fas fa-check-circle text-success"></i>
                                Handverified seller</li>
                            <li class="d-flex align-items-center gap-2"><i class="fas fa-check-circle text-success"></i>
                                Secure campus pickup</li>
                            <li id="preOrderInfo" class="d-none d-flex align-items-center gap-2 text-warning fw-bold">
                                <i class="fas fa-bolt"></i> Pre-order item: Prepared after order
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer style="background:var(--primary-dark);color:rgba(255,255,255,.7);padding:3rem 0 1.5rem">
        <div class="container text-center">
            <p style="margin:0;font-size:.85rem;opacity:.6">© 2026 CampusConnect Market. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/main.js"></script>
    <script>
        let currentProduct = null;
        const productId = new URLSearchParams(window.location.search).get('id');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!productId) { location.href = '/products.html'; return; }

            const res = await API.get(`/api/products/${productId}`);
            if (!res.data) {
                Toast.show('Item not found', 'error');
                setTimeout(() => location.href = '/products.html', 1500);
                return;
            }

            currentProduct = res.data;
            renderProduct();
        });

        function renderProduct() {
            const p = currentProduct;
            document.getElementById('breadcrumbTitle').textContent = p.title;
            document.getElementById('pTitle').textContent = p.title;
            document.getElementById('pPrice').textContent = formatCurrency(p.price);
            document.getElementById('pDesc').textContent = p.description;
            document.getElementById('pLoc').textContent = p.location || 'Unknown';
            document.getElementById('pSeller').textContent = p.seller?.name || 'Local Seller';
            document.getElementById('pStock').textContent = p.stock > 0 ? `${p.stock} units` : 'Out of Stock';
            document.getElementById('pImg').src = p.imageUrl || '/images/placeholder.jpg';

            let badges = '';
            if (p.type === 'PREORDER') {
                badges += `<span class="badge-ccm badge-accent me-2">⚡ Pre-Order</span>`;
                document.getElementById('preOrderInfo').classList.remove('d-none');
            }
            if (p.type === 'EXCHANGE') badges += `<span class="badge-ccm badge-primary">🎓 Student Hub</span>`;
            document.getElementById('pBadges').innerHTML = badges;

            const condEl = document.getElementById('pCondition');
            condEl.textContent = p.condition;
            condEl.className = 'badge-ccm ' + (p.condition === 'NEW' ? 'condition-new' : 'condition-good');
        }

        function handleAddToCart() {
            addToCart(productId);
        }

        function handleToggleWishlist() {
            const btn = { querySelector: (sel) => document.getElementById('wishIcon') };
            toggleWishlist(productId, btn);
        }
    </script>
</body>

</html>
