<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seller Dashboard — CampusConnect Market</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

    <nav class="navbar-ccm">
        <div class="container">
            <div class="d-flex align-items-center justify-content-between gap-3">
                <a href="/index.html" class="navbar-brand-ccm">Campus<span>Connect</span></a>
                <div id="navUserArea" class="d-flex align-items-center gap-2"></div>
            </div>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <h2 class="section-title m-0">Seller Central</h2>
                <button class="btn-primary-ccm" data-bs-toggle="modal" data-bs-target="#addProductModal">
                    <i class="fas fa-plus me-2"></i> List New Product
                </button>
            </div>

            <div class="row g-4 mb-5">
                <div class="col-md-3">
                    <div class="card-ccm p-4 text-center">
                        <div class="display-6 text-primary mb-2" id="liveProducts">0</div>
                        <div class="text-muted small text-uppercase">Live Listings</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-ccm p-4 text-center">
                        <div class="display-6 text-success mb-2" id="salesCount">0</div>
                        <div class="text-muted small text-uppercase">Total Sales</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-ccm p-4 text-center">
                        <div class="display-6 text-info mb-2" id="revenueCount">₹0</div>
                        <div class="text-muted small text-uppercase">Total Revenue</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-ccm p-4 text-center">
                        <div class="display-6 text-warning mb-2" id="pendingOrders">0</div>
                        <div class="text-muted small text-uppercase">Pending Orders</div>
                    </div>
                </div>
            </div>

            <div class="card-ccm p-0 overflow-hidden">
                <div class="p-4 border-bottom d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold m-0">My Active Listings</h5>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Product Info</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Status</th>
                                <th class="px-4 text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="sellerProducts">
                            <tr>
                                <td colspan="6" class="text-center py-5">Loading your listings...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <!-- Add Product Modal -->
    <div class="modal fade" id="addProductModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow" style="border-radius: 20px">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold">List a New Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addProductForm">
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label">Product Name</label>
                                <input type="text" name="title" class="form-control" required
                                    placeholder="e.g., Engineering Mathematics Textbook">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Category</label>
                                <select name="categoryId" id="modalCategories" class="form-select" required></select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Condition</label>
                                <select name="condition" class="form-select">
                                    <option value="NEW">New</option>
                                    <option value="LIKE_NEW">Like New</option>
                                    <option value="GOOD">Good / Used</option>
                                    <option value="FAIR">Fair</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Price (₹)</label>
                                <input type="number" name="price" class="form-control" required step="0.01">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Stock Quantity</label>
                                <input type="number" name="stock" class="form-control" required value="1">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Locality / Campus</label>
                                <input type="text" name="location" class="form-control" placeholder="e.g., Anna Nagar">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea name="description" class="form-control" rows="3" required></textarea>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Listing Type</label>
                                <select name="type" class="form-select" onchange="togglePreOrderFields(this.value)">
                                    <option value="NORMAL">Normal Listing (Standard Sale)</option>
                                    <option value="EXCHANGE">Student Exchange (Used Items/Records)</option>
                                    <option value="PREORDER">Pre-Order Marketplace (Made on order)</option>
                                </select>
                            </div>
                            <div id="preOrderFields" style="display:none" class="col-12 row g-3 mt-1">
                                <div class="col-md-6">
                                    <label class="form-label">Pre-Order Deadline</label>
                                    <input type="date" name="preOrderDeadline" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Min Pre-Order Qty</label>
                                    <input type="number" name="minPreOrderQty" class="form-control" value="1">
                                </div>
                            </div>
                            <div class="col-12 text-end mt-4">
                                <button type="button" class="btn btn-ghost-ccm me-2"
                                    data-bs-dismiss="modal">Cancel</button>
                                <button type="submit" class="btn-primary-ccm px-5">Publish Listing</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer style="background:var(--primary-dark);color:rgba(255,255,255,.7);padding:3rem 0 1.5rem">
        <div class="container text-center">
            <p style="margin:0;font-size:.85rem;opacity:.6">© 2026 CampusConnect Market. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.requireAuth(['SELLER', 'ADMIN'])) return;
            loadStats();
            loadListings();
            loadModalCategories();
        });

        async function loadStats() {
            const statsRes = await API.get('/api/seller/stats');
            if (statsRes.success) {
                const s = statsRes.data;
                document.getElementById('liveProducts').textContent = s.activeProducts || 0;
                document.getElementById('salesCount').textContent = s.totalSales || 0;
                document.getElementById('revenueCount').textContent = formatCurrency(s.totalRevenue || 0);
                document.getElementById('pendingOrders').textContent = s.pendingOrders || 0;
            }
        }

        async function loadModalCategories() {
            const res = await API.get('/api/categories/top-level');
            if (res.data) {
                document.getElementById('modalCategories').innerHTML = res.data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            }
        }

        async function loadListings() {
            const res = await API.get('/api/seller/products');
            const tbody = document.getElementById('sellerProducts');

            if (!res.data || res.data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">You haven\'t listed any products yet.</td></tr>';
                return;
            }

            tbody.innerHTML = res.data.map(p => `
    <tr>
      <td class="ps-4">
        <div class="d-flex align-items-center gap-3">
          <img src="${p.imageUrl || '/images/placeholder.jpg'}" class="rounded" style="width:45px;height:45px;object-fit:cover">
          <div>
            <div class="fw-bold">${p.title}</div>
            <div class="small text-muted">ID: #${p.id}</div>
          </div>
        </div>
      </td>
      <td><span class="badge bg-light text-dark">${p.category?.name}</span></td>
      <td class="fw-bold">${formatCurrency(p.price)}</td>
      <td>${p.stock}</td>
      <td><span class="badge-ccm ${p.isActive ? 'bg-success' : 'bg-secondary'}">${p.isActive ? 'Live' : 'Hidden'}</span></td>
      <td class="px-4 text-end">
        <button class="btn btn-sm btn-outline-primary" onclick="location.href='/product-detail.html?id=${p.id}'"><i class="fas fa-eye"></i></button>
        <button class="btn btn-sm btn-outline-danger ms-1" onclick="deactivate(${p.id})"><i class="fas fa-trash"></i></button>
      </td>
    </tr>
  `).join('');
        }

        function togglePreOrderFields(val) {
            document.getElementById('preOrderFields').style.display = (val === 'PREORDER') ? 'flex' : 'none';
        }

        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const payload = Object.fromEntries(formData.entries());
            payload.isActive = true;

            const res = await API.post('/api/products', payload);
            if (res.success) {
                Toast.show('Product listed successfully!', 'success');
                bootstrap.Modal.getInstance(document.getElementById('addProductModal')).hide();
                loadListings();
                loadStats();
            } else {
                Toast.show(res.message || 'Failed to list product', 'error');
            }
        });

        async function deactivate(id) {
            if (confirm('Are you sure you want to remove this listing?')) {
                const res = await API.delete(`/api/products/${id}`);
                if (res.success) {
                    Toast.show('Listing removed', 'info');
                    loadListings();
                    loadStats();
                }
            }
        }
    </script>
</body>

</html>
