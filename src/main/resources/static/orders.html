<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order History — CampusConnect Market</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

  <nav class="navbar-ccm">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between gap-3">
        <a href="/index.html" class="navbar-brand-ccm">Campus<span>Connect</span></a>
        <div id="navUserArea" class="d-flex align-items-center gap-2"></div>
      </div>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <h2 class="section-title mb-4">My Orders</h2>
      <div id="ordersList">
        <div class="text-center py-5">
          <div class="spinner-border text-primary"></div>
        </div>
      </div>
    </div>
  </section>

  <footer style="background:var(--primary-dark);color:rgba(255,255,255,.7);padding:3rem 0 1.5rem">
    <div class="container text-center">
      <p style="margin:0;font-size:.85rem;opacity:.6">© 2026 CampusConnect Market. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.requireAuth()) return;
      loadOrders();
    });

    async function loadOrders() {
      try {
        const res = await API.get('/api/orders/my');
        const list = document.getElementById('ordersList');

        if (!res.data || res.data.length === 0) {
          list.innerHTML = '<div class="card-ccm p-5 text-center text-muted">You haven\'t placed any orders yet.</div>';
          return;
        }

        list.innerHTML = res.data.map(order => `
          <div class="card-ccm p-0 mb-4 overflow-hidden">
            <div class="bg-light p-3 d-flex justify-content-between align-items-center flex-wrap gap-3">
              <div class="d-flex gap-4">
                <div><div class="small text-muted">Order Date</div><div class="fw-bold">${formatDate(order.createdAt)}</div></div>
                <div><div class="small text-muted">Total</div><div class="fw-bold text-primary">${formatCurrency(order.totalAmount)}</div></div>
                <div><div class="small text-muted">Status</div><span class="badge-ccm bg-info">${order.status}</span></div>
              </div>
              <div class="fw-bold text-muted">${order.orderNumber}</div>
            </div>
            <div class="p-3">
              ${order.items.map(item => `
                <div class="d-flex align-items-center gap-3 mb-3 pb-3 border-bottom last-child-no-border">
                  <img src="${item.product.imageUrl || 'https://via.placeholder.com/60'}" style="width:60px;height:60px;object-fit:cover" class="rounded">
                  <div class="flex-grow-1">
                    <div class="fw-bold">${item.product.title}</div>
                    <div class="small text-muted">Qty: ${item.quantity} · Price: ${formatCurrency(item.price)}</div>
                  </div>
                  <div>
                    <a href="/product-detail.html?id=${item.product.id}" class="btn btn-sm btn-outline-primary">View Item</a>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error('Error loading orders:', err);
        document.getElementById('ordersList').innerHTML = '<div class="card-ccm p-5 text-center text-danger">Error loading orders. Please try again later.</div>';
      }
    }
  </script>
</body>

</html>
