<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart — CampusConnect Market</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

    <nav class="navbar-ccm">
        <div class="container">
            <div class="d-flex align-items-center justify-content-between gap-3">
                <a href="/index.html" class="navbar-brand-ccm">Campus<span>Connect</span></a>
                <div id="navUserArea" class="d-flex align-items-center gap-2"></div>
            </div>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <h2 class="section-title mb-4">Shopping Cart</h2>

            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card-ccm p-0 overflow-hidden">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4 py-3">Product</th>
                                        <th class="py-3">Price</th>
                                        <th class="py-3">Quantity</th>
                                        <th class="py-3">Subtotal</th>
                                        <th class="py-3 px-4"></th>
                                    </tr>
                                </thead>
                                <tbody id="cartItems">
                                    <tr>
                                        <td colspan="5" class="text-center py-5">
                                            <div class="spinner-border text-primary" role="status"></div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <a href="/products.html" class="btn btn-link mt-3 text-decoration-none p-0">
                        <i class="fas fa-arrow-left me-2"></i> Continue Shopping
                    </a>
                </div>

                <div class="col-lg-4">
                    <div class="card-ccm p-4">
                        <h5 class="fw-bold mb-4">Order Summary</h5>
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Subtotal</span>
                            <span id="subtotal">₹0.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Platform Fee</span>
                            <span class="text-success">FREE</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <span class="fw-bold">Total</span>
                            <span class="h4 fw-bold text-primary m-0" id="grandTotal">₹0.00</span>
                        </div>
                        <button class="btn-primary-ccm w-100 justify-content-center py-3" onclick="checkout()">
                            Proceed to Checkout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer style="background:var(--primary-dark);color:rgba(255,255,255,.7);padding:3rem 0 1.5rem">
        <div class="container text-center">
            <p style="margin:0;font-size:.85rem;opacity:.6">© 2026 CampusConnect Market. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.requireAuth()) return;
            loadCart();
        });

        async function loadCart() {
            const res = await API.get('/api/cart');
            const tbody = document.getElementById('cartItems');

            if (!res.data || res.data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-muted">Your cart is empty.</td></tr>';
                updateTotals(0);
                return;
            }

            let total = 0;
            tbody.innerHTML = res.data.map(item => {
                const sub = item.product.price * item.quantity;
                total += sub;
                return `
      <tr>
        <td class="ps-4">
          <div class="d-flex align-items-center gap-3">
            <img src="${item.product.imageUrl || '/images/placeholder.jpg'}" class="rounded" style="width:50px;height:50px;object-fit:cover">
            <div>
              <div class="fw-bold">${item.product.title}</div>
              <div class="small text-muted">${item.product.seller?.name || 'Seller'}</div>
            </div>
          </div>
        </td>
        <td>${formatCurrency(item.product.price)}</td>
        <td>
          <div class="input-group input-group-sm" style="width: 100px">
            <button class="btn btn-outline-secondary" onclick="updateQty(${item.id}, ${item.quantity - 1})">-</button>
            <input type="text" class="form-control text-center" value="${item.quantity}" readonly>
            <button class="btn btn-outline-secondary" onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
          </div>
        </td>
        <td class="fw-bold">${formatCurrency(sub)}</td>
        <td class="px-4 text-end">
          <button class="btn btn-sm btn-outline-danger" onclick="removeItem(${item.id})">
            <i class="fas fa-trash"></i>
          </button>
        </td>
      </tr>`;
            }).join('');

            updateTotals(total);
        }

        function updateTotals(total) {
            document.getElementById('subtotal').textContent = formatCurrency(total);
            document.getElementById('grandTotal').textContent = formatCurrency(total);
        }

        async function updateQty(itemId, newQty) {
            if (newQty < 1) return;
            await API.put(`/api/cart/${itemId}`, { quantity: newQty });
            loadCart();
            updateNavBadges();
        }

        async function removeItem(itemId) {
            await API.delete(`/api/cart/${itemId}`);
            loadCart();
            updateNavBadges();
        }

        async function checkout() {
            const address = prompt('Please enter your delivery address:', 'Campus Hostel Room 101');
            if (!address) return;

            Toast.show('Processing order...', 'info');
            const res = await API.post('/api/orders', {
                deliveryAddress: address,
                paymentMethod: 'Cash on Delivery'
            });

            if (res.success) {
                Toast.show('Order placed successfully! 🎉', 'success');
                setTimeout(() => location.href = '/orders.html', 1500);
            } else {
                Toast.show(res.message || 'Error placing order', 'error');
            }
        }
    </script>
</body>

</html>
